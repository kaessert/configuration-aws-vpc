---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: vpcs.aws.platform.upbound.io
spec:
  scope: Namespaced
  group: aws.platform.upbound.io
  names:
    kind: VPC
    plural: vpcs
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - region
              properties:
                # Core Network Configuration
                region:
                  type: string
                  description: AWS region where the VPC will be created
                  pattern: ^[a-z]{2}-[a-z]+-\d{1}$

                cidr:
                  type: string
                  description: The IPv4 CIDR block for the VPC (mutually exclusive with IPAM pool)
                  pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                # IPAM Configuration (mutually exclusive with cidr)
                ipv4IpamPoolId:
                  type: string
                  description: ID of the IPAM pool from which to allocate the VPC CIDR (mutually exclusive with cidr)

                ipv4NetmaskLength:
                  type: integer
                  description: Netmask length for IPAM-allocated CIDR (e.g., 16 for /16)
                  minimum: 0
                  maximum: 32

                secondaryCidrBlocks:
                  type: array
                  description: Additional IPv4 CIDR blocks to associate with the VPC
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                azs:
                  type: array
                  description: List of availability zones for subnet distribution
                  items:
                    type: string
                  minItems: 1

                # Subnet Configuration
                publicSubnets:
                  type: array
                  description: List of CIDR blocks for public subnets
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                privateSubnets:
                  type: array
                  description: List of CIDR blocks for private subnets
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                databaseSubnets:
                  type: array
                  description: List of CIDR blocks for database subnets
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                elasticacheSubnets:
                  type: array
                  description: List of CIDR blocks for ElastiCache subnets
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                redshiftSubnets:
                  type: array
                  description: List of CIDR blocks for Redshift subnets
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                intraSubnets:
                  type: array
                  description: List of CIDR blocks for intra subnets (no internet access)
                  items:
                    type: string
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$

                # Gateway Configuration
                createIgw:
                  type: boolean
                  description: Create an Internet Gateway for the VPC
                  default: true

                enableNatGateway:
                  type: boolean
                  description: Create NAT Gateways for private subnet internet access
                  default: false

                singleNatGateway:
                  type: boolean
                  description: Use a single NAT Gateway for all availability zones (cost optimization)
                  default: false

                oneNatGatewayPerAz:
                  type: boolean
                  description: Create one NAT Gateway per availability zone (high availability)
                  default: false

                oneNatGatewayPerSubnet:
                  type: boolean
                  description: Create one NAT Gateway per public subnet (maximum availability, highest cost)
                  default: false

                reuseNatIps:
                  type: boolean
                  description: Reuse existing Elastic IPs for NAT Gateways instead of creating new ones
                  default: false

                externalNatIpIds:
                  type: array
                  description: List of EIP allocation IDs to use for NAT Gateways (used with reuseNatIps)
                  items:
                    type: string
                  default: []

                natGatewayDestinationCidrBlock:
                  type: string
                  description: Destination CIDR block for NAT Gateway routes in private route tables
                  default: "0.0.0.0/0"

                # DNS Configuration
                enableDnsHostnames:
                  type: boolean
                  description: Enable DNS hostnames in the VPC
                  default: true

                enableDnsSupport:
                  type: boolean
                  description: Enable DNS resolution in the VPC
                  default: true

                enableDns64:
                  type: boolean
                  description: Enable DNS64 for IPv6
                  default: false

                # DHCP Options
                enableDhcpOptions:
                  type: boolean
                  description: Enable custom DHCP options (if false, AWS default DHCP options are used)
                  default: false

                dhcpOptionsDomainName:
                  type: string
                  description: Custom domain name for DHCP options

                dhcpOptionsDomainNameServers:
                  type: array
                  description: List of DNS servers for DHCP options
                  items:
                    type: string

                dhcpOptionsNtpServers:
                  type: array
                  description: List of NTP servers for DHCP options
                  items:
                    type: string

                dhcpOptionsNetbiosNameServers:
                  type: array
                  description: List of NetBIOS name servers for DHCP options
                  items:
                    type: string

                dhcpOptionsNetbiosNodeType:
                  type: integer
                  description: NetBIOS node type (1, 2, 4, or 8)
                  enum: [1, 2, 4, 8]

                # VPC Endpoints
                createVpcEndpoints:
                  type: boolean
                  description: Enable VPC endpoints
                  default: false

                enableS3Endpoint:
                  type: boolean
                  description: Enable S3 VPC endpoint
                  default: false

                s3EndpointType:
                  type: string
                  description: S3 VPC endpoint type (Gateway or Interface)
                  enum: ["Gateway", "Interface"]
                  default: "Gateway"

                enableDynamodbEndpoint:
                  type: boolean
                  description: Enable DynamoDB VPC endpoint
                  default: false

                # Interface VPC Endpoints (PrivateLink)
                enableInterfaceEndpoints:
                  type: boolean
                  description: Enable Interface VPC Endpoints for AWS services. NOTE - Endpoints will use VPC default security group (provider limitation).
                  default: false

                interfaceEndpointServices:
                  type: array
                  description: List of AWS service names for Interface endpoints (e.g., ec2, ssm, rds, secretsmanager, ecr.api, ecr.dkr, ecs, ecs-agent, ecs-telemetry, logs, kms, elasticloadbalancing)
                  items:
                    type: string
                  default: []

                enableInterfaceEndpointPrivateDns:
                  type: boolean
                  description: Enable private DNS for Interface endpoints
                  default: true

                interfaceEndpointPolicies:
                  type: object
                  description: Map of service name to IAM policy JSON string for endpoint policies
                  additionalProperties:
                    type: string
                  default: {}

                # Flow Logs
                enableFlowLog:
                  type: boolean
                  description: Enable VPC Flow Logs
                  default: false

                createFlowLogCloudwatchLogGroup:
                  type: boolean
                  description: Create CloudWatch Log Group for Flow Logs
                  default: false

                createFlowLogS3Bucket:
                  type: boolean
                  description: Create S3 bucket for Flow Logs
                  default: false

                flowLogMaxAggregationInterval:
                  type: integer
                  description: Maximum aggregation interval for Flow Logs (60 or 600 seconds)
                  enum: [60, 600]
                  default: 600

                flowLogTrafficType:
                  type: string
                  description: Type of traffic to log (ACCEPT, REJECT, or ALL)
                  enum: ["ACCEPT", "REJECT", "ALL"]
                  default: "ALL"

                flowLogFileFormat:
                  type: string
                  description: File format for S3 flow logs (plain-text or parquet)
                  enum: ["plain-text", "parquet"]
                  default: "plain-text"

                flowLogHiveCompatiblePartitions:
                  type: boolean
                  description: Use Hive-compatible prefixes for S3 flow logs
                  default: false

                flowLogPerHourPartition:
                  type: boolean
                  description: Partition S3 flow logs per hour
                  default: false

                # Network Configuration
                mapPublicIpOnLaunch:
                  type: boolean
                  description: Auto-assign public IP addresses to instances launched in public subnets
                  default: true

                enableVpnGateway:
                  type: boolean
                  description: Create a VPN Gateway attached to the VPC
                  default: false

                vpnGatewayId:
                  type: string
                  description: Use existing VPN Gateway ID (optional, if not specified a new one will be created)

                amazonSideAsn:
                  type: integer
                  description: BGP ASN for Amazon side of the VPN Gateway (default 64512)
                  default: 64512
                  minimum: 64512
                  maximum: 65534

                vpnGatewayAz:
                  type: string
                  description: Availability zone for VPN Gateway (optional)

                propagatePublicRouteTablesVgw:
                  type: boolean
                  description: Propagate VPN Gateway routes to public route tables
                  default: true

                propagatePrivateRouteTablesVgw:
                  type: boolean
                  description: Propagate VPN Gateway routes to private route tables
                  default: true

                propagateIntraRouteTablesVgw:
                  type: boolean
                  description: Propagate VPN Gateway routes to intra route tables
                  default: false

                propagateDatabaseRouteTablesVgw:
                  type: boolean
                  description: Propagate VPN Gateway routes to database route tables
                  default: false

                vpnGatewayTags:
                  type: object
                  description: Additional tags for VPN Gateway
                  additionalProperties:
                    type: string

                # Customer Gateway Configuration
                customerGateways:
                  type: object
                  description: Map of Customer Gateway configurations (key is a unique name for each gateway)
                  additionalProperties:
                    type: object
                    properties:
                      bgpAsn:
                        type: integer
                        description: Border Gateway Protocol ASN (1-2147483647)
                        minimum: 1
                        maximum: 2147483647
                      bgpAsnExtended:
                        type: string
                        description: Extended BGP ASN (2147483648-4294967295, conflicts with bgpAsn)
                      ipAddress:
                        type: string
                        description: IPv4 address for the customer gateway device's outside interface
                      type:
                        type: string
                        description: Type of VPN connection (only ipsec.1 is supported)
                        default: ipsec.1
                        enum:
                          - ipsec.1
                      deviceName:
                        type: string
                        description: Name for the customer gateway device
                      certificateArn:
                        type: string
                        description: Amazon Resource Name for the customer gateway certificate
                      tags:
                        type: object
                        description: Additional tags for this customer gateway
                        additionalProperties:
                          type: string

                # IPv6 Configuration
                enableIpv6:
                  type: boolean
                  description: Enable IPv6 CIDR block for the VPC
                  default: false

                assignGeneratedIpv6CidrBlock:
                  type: boolean
                  description: Request an Amazon-provided IPv6 CIDR block with /56 prefix length
                  default: true

                ipv6CidrBlock:
                  type: string
                  description: IPv6 CIDR block for the VPC (if not using Amazon-provided block)

                ipv6IpamPoolId:
                  type: string
                  description: ID of the IPAM pool from which to allocate the IPv6 CIDR

                ipv6NetmaskLength:
                  type: integer
                  description: Netmask length for IPAM-allocated IPv6 CIDR (e.g., 56 for /56)
                  minimum: 0
                  maximum: 128

                # IPv6 Subnet Configuration
                assignIpv6AddressOnCreation:
                  type: boolean
                  description: Auto-assign IPv6 addresses to instances launched in subnets
                  default: false

                publicSubnetIpv6Prefixes:
                  type: array
                  description: IPv6 netnum prefixes for public subnets (e.g., [0, 1, 2] for ::/64 blocks)
                  items:
                    type: integer

                privateSubnetIpv6Prefixes:
                  type: array
                  description: IPv6 netnum prefixes for private subnets
                  items:
                    type: integer

                databaseSubnetIpv6Prefixes:
                  type: array
                  description: IPv6 netnum prefixes for database subnets
                  items:
                    type: integer

                elasticacheSubnetIpv6Prefixes:
                  type: array
                  description: IPv6 netnum prefixes for ElastiCache subnets
                  items:
                    type: integer

                redshiftSubnetIpv6Prefixes:
                  type: array
                  description: IPv6 netnum prefixes for Redshift subnets
                  items:
                    type: integer

                intraSubnetIpv6Prefixes:
                  type: array
                  description: IPv6 netnum prefixes for intra subnets
                  items:
                    type: integer

                ipv6Native:
                  type: boolean
                  description: Create IPv6-only subnets (no IPv4)
                  default: false

                enableResourceNameDnsAaaaRecordOnLaunch:
                  type: boolean
                  description: Enable resource name DNS AAAA record on launch for IPv6
                  default: false

                privateDnsHostnameTypeOnLaunch:
                  type: string
                  description: Type of hostname for EC2 instances (ip-name or resource-name)
                  enum:
                    - ip-name
                    - resource-name

                # IPv6 Gateway Configuration
                createEgressOnlyIgw:
                  type: boolean
                  description: Create an Egress-Only Internet Gateway for IPv6 private subnet internet access
                  default: false

                # Route Table Configuration
                createDatabaseSubnetRouteTable:
                  type: boolean
                  description: Create separate route table for database subnets
                  default: false

                createDatabaseNatGatewayRoute:
                  type: boolean
                  description: Create NAT Gateway route for database subnets
                  default: false

                createDatabaseInternetGatewayRoute:
                  type: boolean
                  description: Create Internet Gateway route for database subnets (WARNING - enables public access)
                  default: false

                createElasticacheSubnetRouteTable:
                  type: boolean
                  description: Create separate route table for ElastiCache subnets
                  default: false

                createElasticacheNatGatewayRoute:
                  type: boolean
                  description: Create NAT Gateway route for ElastiCache subnets (requires createElasticacheSubnetRouteTable)
                  default: false

                createRedshiftSubnetRouteTable:
                  type: boolean
                  description: Create separate route table for Redshift subnets
                  default: false

                createRedshiftNatGatewayRoute:
                  type: boolean
                  description: Create NAT Gateway route for Redshift subnets (requires createRedshiftSubnetRouteTable)
                  default: false

                createRedshiftPublicSubnetRouteTable:
                  type: boolean
                  description: Create separate public route table for Redshift subnets
                  default: false

                enablePublicRedshift:
                  type: boolean
                  description: Enable public Redshift cluster by routing through IGW (requires createRedshiftPublicSubnetRouteTable)
                  default: false

                onePublicRouteTablePerAz:
                  type: boolean
                  description: Create one public route table per AZ instead of a single shared table
                  default: false

                oneIntraRouteTablePerAz:
                  type: boolean
                  description: Create one intra route table per AZ instead of a single shared table for enhanced isolation
                  default: false

                # Subnet Group Configuration
                createDatabaseSubnetGroup:
                  type: boolean
                  description: Create DB subnet group for RDS instances (auto-enabled when databaseSubnets exist)
                  default: false

                databaseSubnetGroupName:
                  type: string
                  description: Custom name for the database subnet group (defaults to <vpc-name>-db if not specified)

                databaseSubnetGroupTags:
                  type: object
                  description: Additional tags for database subnet group
                  additionalProperties:
                    type: string

                createElasticacheSubnetGroup:
                  type: boolean
                  description: Create ElastiCache subnet group (auto-enabled when elasticacheSubnets exist)
                  default: false

                elasticacheSubnetGroupName:
                  type: string
                  description: Custom name for the ElastiCache subnet group (defaults to <vpc-name>-elasticache if not specified)

                elasticacheSubnetGroupTags:
                  type: object
                  description: Additional tags for ElastiCache subnet group
                  additionalProperties:
                    type: string

                createRedshiftSubnetGroup:
                  type: boolean
                  description: Create Redshift subnet group (auto-enabled when redshiftSubnets exist)
                  default: false

                redshiftSubnetGroupName:
                  type: string
                  description: Custom name for the Redshift subnet group (defaults to <vpc-name>-redshift if not specified)

                redshiftSubnetGroupTags:
                  type: object
                  description: Additional tags for Redshift subnet group
                  additionalProperties:
                    type: string

                # Tagging
                tags:
                  type: object
                  description: Common tags to apply to all resources
                  additionalProperties:
                    type: string

                vpcTags:
                  type: object
                  description: Additional tags for the VPC
                  additionalProperties:
                    type: string

                publicSubnetTags:
                  type: object
                  description: Additional tags for public subnets
                  additionalProperties:
                    type: string

                privateSubnetTags:
                  type: object
                  description: Additional tags for private subnets
                  additionalProperties:
                    type: string

                databaseSubnetTags:
                  type: object
                  description: Additional tags for database subnets
                  additionalProperties:
                    type: string

                elasticacheSubnetTags:
                  type: object
                  description: Additional tags for ElastiCache subnets
                  additionalProperties:
                    type: string

                redshiftSubnetTags:
                  type: object
                  description: Additional tags for Redshift subnets
                  additionalProperties:
                    type: string

                intraSubnetTags:
                  type: object
                  description: Additional tags for intra subnets
                  additionalProperties:
                    type: string

                vpcEndpointTags:
                  type: object
                  description: Additional tags for VPC endpoints
                  additionalProperties:
                    type: string

                # Network ACL Configuration
                publicDedicatedNetworkAcl:
                  type: boolean
                  description: Create dedicated Network ACL for public subnets
                  default: false

                publicInboundAclRules:
                  type: array
                  description: Inbound ACL rules for public subnets
                  items:
                    type: object
                    required:
                      - ruleNumber
                      - protocol
                      - ruleAction
                      - cidrBlock
                    properties:
                      ruleNumber:
                        type: integer
                        description: Rule number (100-32766)
                        minimum: 100
                        maximum: 32766
                      protocol:
                        type: string
                        description: Protocol (-1 for all, or protocol number like tcp=6, udp=17, icmp=1)
                      ruleAction:
                        type: string
                        description: Allow or deny
                        enum: ["allow", "deny"]
                      cidrBlock:
                        type: string
                        description: CIDR block to allow/deny
                        pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                      fromPort:
                        type: integer
                        description: Starting port (0-65535)
                        minimum: 0
                        maximum: 65535
                      toPort:
                        type: integer
                        description: Ending port (0-65535)
                        minimum: 0
                        maximum: 65535
                      icmpType:
                        type: integer
                        description: ICMP type
                      icmpCode:
                        type: integer
                        description: ICMP code

                publicOutboundAclRules:
                  type: array
                  description: Outbound ACL rules for public subnets
                  items:
                    type: object
                    required:
                      - ruleNumber
                      - protocol
                      - ruleAction
                      - cidrBlock
                    properties:
                      ruleNumber:
                        type: integer
                        description: Rule number (100-32766)
                        minimum: 100
                        maximum: 32766
                      protocol:
                        type: string
                        description: Protocol (-1 for all, or protocol number like tcp=6, udp=17, icmp=1)
                      ruleAction:
                        type: string
                        description: Allow or deny
                        enum: ["allow", "deny"]
                      cidrBlock:
                        type: string
                        description: CIDR block to allow/deny
                        pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                      fromPort:
                        type: integer
                        description: Starting port (0-65535)
                        minimum: 0
                        maximum: 65535
                      toPort:
                        type: integer
                        description: Ending port (0-65535)
                        minimum: 0
                        maximum: 65535
                      icmpType:
                        type: integer
                        description: ICMP type
                      icmpCode:
                        type: integer
                        description: ICMP code

                publicAclTags:
                  type: object
                  description: Additional tags for public subnet Network ACLs
                  additionalProperties:
                    type: string

                privateDedicatedNetworkAcl:
                  type: boolean
                  description: Create dedicated Network ACL for private subnets
                  default: false

                privateInboundAclRules:
                  type: array
                  description: Inbound ACL rules for private subnets
                  items:
                    type: object
                    required:
                      - ruleNumber
                      - protocol
                      - ruleAction
                      - cidrBlock
                    properties:
                      ruleNumber:
                        type: integer
                        minimum: 100
                        maximum: 32766
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                        enum: ["allow", "deny"]
                      cidrBlock:
                        type: string
                        pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                      fromPort:
                        type: integer
                        minimum: 0
                        maximum: 65535
                      toPort:
                        type: integer
                        minimum: 0
                        maximum: 65535
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                privateOutboundAclRules:
                  type: array
                  description: Outbound ACL rules for private subnets
                  items:
                    type: object
                    required:
                      - ruleNumber
                      - protocol
                      - ruleAction
                      - cidrBlock
                    properties:
                      ruleNumber:
                        type: integer
                        minimum: 100
                        maximum: 32766
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                        enum: ["allow", "deny"]
                      cidrBlock:
                        type: string
                        pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                      fromPort:
                        type: integer
                        minimum: 0
                        maximum: 65535
                      toPort:
                        type: integer
                        minimum: 0
                        maximum: 65535
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                privateAclTags:
                  type: object
                  description: Additional tags for private subnet Network ACLs
                  additionalProperties:
                    type: string

                # Database subnet Network ACLs
                databaseDedicatedNetworkAcl:
                  type: boolean
                  description: Create dedicated Network ACL for database subnets
                  default: false

                databaseInboundAclRules:
                  type: array
                  description: Inbound ACL rules for database subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                databaseOutboundAclRules:
                  type: array
                  description: Outbound ACL rules for database subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                databaseAclTags:
                  type: object
                  description: Additional tags for database subnet Network ACLs
                  additionalProperties:
                    type: string

                # ElastiCache subnet Network ACLs
                elasticacheDedicatedNetworkAcl:
                  type: boolean
                  description: Create dedicated Network ACL for ElastiCache subnets
                  default: false

                elasticacheInboundAclRules:
                  type: array
                  description: Inbound ACL rules for ElastiCache subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                elasticacheOutboundAclRules:
                  type: array
                  description: Outbound ACL rules for ElastiCache subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                elasticacheAclTags:
                  type: object
                  description: Additional tags for ElastiCache subnet Network ACLs
                  additionalProperties:
                    type: string

                # Redshift subnet Network ACLs
                redshiftDedicatedNetworkAcl:
                  type: boolean
                  description: Create dedicated Network ACL for Redshift subnets
                  default: false

                redshiftInboundAclRules:
                  type: array
                  description: Inbound ACL rules for Redshift subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                redshiftOutboundAclRules:
                  type: array
                  description: Outbound ACL rules for Redshift subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                redshiftAclTags:
                  type: object
                  description: Additional tags for Redshift subnet Network ACLs
                  additionalProperties:
                    type: string

                # Intra subnet Network ACLs
                intraDedicatedNetworkAcl:
                  type: boolean
                  description: Create dedicated Network ACL for intra subnets
                  default: false

                intraInboundAclRules:
                  type: array
                  description: Inbound ACL rules for intra subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                intraOutboundAclRules:
                  type: array
                  description: Outbound ACL rules for intra subnets
                  items:
                    type: object
                    properties:
                      ruleNumber:
                        type: integer
                      protocol:
                        type: string
                      ruleAction:
                        type: string
                      cidrBlock:
                        type: string
                      fromPort:
                        type: integer
                      toPort:
                        type: integer
                      icmpType:
                        type: integer
                      icmpCode:
                        type: integer

                intraAclTags:
                  type: object
                  description: Additional tags for intra subnet Network ACLs
                  additionalProperties:
                    type: string

            status:
              type: object
              properties:
                # VPC Outputs
                vpcId:
                  type: string
                  description: ID of the VPC

                vpcArn:
                  type: string
                  description: ARN of the VPC

                vpcCidrBlock:
                  type: string
                  description: The CIDR block of the VPC

                vpcIpv6CidrBlock:
                  type: string
